model_name: Qwen3-30B-A3B-Base
tokenizer_dir: checkpoints/Qwen3-30B-A3B-Base
devices: auto
num_nodes: 1
seed: 42
logger_name: wandb
run_name: safemoe-qwen-non-freeze-shared-stage2-relu-0415
precision: bf16-mixed
log:
  project: safemoe

stage: warmup
# base_checkpoint: checkpoints/safemoe-qwen-warmup-wmdp-harmful-bootstrap-freeze-shared/step-00010000
# num_harmful_experts: 8
# epsilon: 1.0e-5

initial_checkpoint_dir: checkpoints/safemoe-qwen-warmup-wmdp-harmful-bootstrap-freeze-shared/step-00010000  # 从该目录读取 model_config.yaml（含 harmful_expert_indices）并加载其 lit_model.pth 权重


# Warmup auxiliary routing loss; with forced harmful routing, this can be 0.
warmup_routing_loss_weight: 0.2
warmup_harmful_mass_floor: 0.5
warmup_std_mass_ceiling: 0.1
warmup_routing_loss_type: relu

# Only train on D_harmful batches.
harmful_only: false
# Hard constrain router to pick from harmful experts only.
force_harmful_routing: false
# Freeze shared parameters (attention/embedding/router/lm_head/norm, etc.).
freeze_theta_shared: true

train:
  micro_batch_size: 2
  global_batch_size: 16
  save_interval: 100
  log_interval: 20
  max_tokens: 1000000000
  max_seq_length: 4096
  max_norm: 1.0
  min_lr: 1.0e-06
  lr_warmup_steps: 100

eval:
  interval: 100
  max_iters: 50
  initial_validation: true
  final_validation: true

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 1.0e-05
    weight_decay: 0.01
    betas:
      - 0.9
      - 0.95

data:
  class_path: litgpt.data.SafeData
  init_args:
    cache_dir: data/.cache
    seed: 42
    datasets:
      finewebedu:
        path: data/fineweb-edu-100b-shuffle
        text_column: text
        role: std
        label_ratio: 0.01
        unlabel_ratio: 0.0
        label_weight: 0.9
        unlabel_weight: 0.0
        prepare_mode: chunked
        train_is_shuffled: true
        val_strategy: smallest_train_shard
      wmdp_bio_retain:
        path: data/wmdp/bio-retain-corpus
        text_column: text
        role: std
        label_ratio: 1.0
        unlabel_ratio: 0.0
        label_weight: 0.1
        unlabel_weight: 0.0
        prepare_mode: in_memory
      wmdp_bio_forget:
        path: data/wmdp/bio-forget-corpus
        text_column: text
        role: harmful
        label_ratio: 1.0
        unlabel_ratio: 0.0
        label_weight: 1.0
        unlabel_weight: 0.0
        prepare_mode: in_memory

# Keep only harmful split active during training.
upsample_std: 0.25
upsample_harmful: 1.0
upsample_unlabeled: 0.0
