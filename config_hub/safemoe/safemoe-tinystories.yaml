# safemoe/configs/safemoe-tinystories.yaml
# Based on config_hub/pretrain/tinystories.yaml (stories15M) with MoE fields added.
# Follows litgpt YAML structure: model_name + model_config: nesting, train: nesting.

# The name of the model. Maps to setup(model_name=...).
model_name: safemoe-tinystories
run_name: safemoe-tinystories

tokenizer_dir: checkpoints/Qwen3-30B-A3B-Base

# SafeMoEConfig fields — all arch fields must be nested here.
model_config:
  name: safemoe-tinystories
  block_size: 256
  vocab_size: 151643
  padded_vocab_size: 152064
  n_layer: 4
  n_head: 4
  n_query_groups: 4
  n_embd: 128
  head_size: 32
  rotary_percentage: 1.0
  parallel_residual: false
  bias: false
  norm_class_name: RMSNorm
  mlp_class_name: LLaMAMoE
  moe_intermediate_size: 256
  n_expert: 8
  n_expert_per_token: 2
  # SafeMoEConfig-specific fields:
  harmful_expert_indices: [0, 1]
  num_harmful_experts: 2
  harmful_attn_heads: [0, 1]

# Training-related arguments (TrainArgs fields).
# gradient_accumulation_iters is computed as global_batch_size / micro_batch_size / devices.
# With micro_batch_size=4 and global_batch_size=16 on 1 device: 16/4/1 = 4 accumulation steps.
train:
  micro_batch_size: 4
  global_batch_size: 16
  save_interval: 2000
  log_interval: 100
  max_tokens: 300000000

# Data module — SafeDataModule instantiated via jsonargparse class_path syntax.
data:
  class_path: litgpt.data.SafeData
  init_args:
    cache_dir: data/.cache
    seed: 42
    num_workers: 8
    datasets:
      tinystories_en:
        path: data/multilingual-tinystories/en
        text_column: text
        role: std
        label_ratio: 0.25
        unlabel_ratio: 0.75
        label_weight: 1.0
        unlabel_weight: 1.0
        prepare_mode: in_memory
      tinystories_es:
        path: data/multilingual-tinystories/es
        text_column: text
        role: harmful
        label_ratio: 0.99
        unlabel_ratio: 0.01
        label_weight: 1.0
        unlabel_weight: 1.0
        prepare_mode: in_memory

upsample_std: 1
upsample_harmful: 1
upsample_unlabeled: 1
